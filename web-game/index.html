<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c1210" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>雷鸣战场 — Web Demo</title>
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <style>
      :root {
        --bg: #0c1210;
        --panel: rgba(12, 22, 18, 0.82);
        --ink: #d7e6d4;
        --accent: #c4a35a;
        --danger: #c45c3a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", "Noto Sans", sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      #game-root {
        width: min(1280px, 100vw);
        height: min(720px, 100dvh, 100vh);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(196, 163, 90, 0.25);
        background: #000;
        touch-action: none;
      }
      /* Mobile / to‘liq ekran */
      html.fs-mobile, html.fs-mobile body, html.fs-mobile #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
      }
      html.fs-mobile #app { place-items: stretch; }
      html.fs-mobile #game-root {
        width: 100vw !important;
        height: 100dvh !important;
        max-width: none !important;
        max-height: none !important;
        border: none !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }
      html.fs-mobile #hud-overlay { display: none !important; }
      #game-root canvas {
        outline: none;
        /* PNG pixel-perfect — brauzer blur yo‘q */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
      #hud-overlay {
        position: fixed; left: 16px; top: 16px; z-index: 10;
        pointer-events: none; padding: 12px 16px;
        border: 1px solid rgba(196, 163, 90, 0.35);
        background: var(--panel); backdrop-filter: blur(8px); max-width: 420px;
      }
      #hud-overlay h1 {
        margin: 0 0 6px; font-size: 15px; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--accent); font-weight: 600;
      }
      #hud-overlay p { margin: 0; font-size: 12px; line-height: 1.45; opacity: 0.9; }
      @media (orientation: portrait) and (pointer: coarse) {
        html:not(.fs-mobile) #game-root {
          width: 100vw;
          height: min(56.25vw, 100dvh);
        }
      }
    </style>
  </head>
  <body>
    <div id="hud-overlay">
      <h1>雷鸣战场</h1>
      <p>
        Avval <b>Main Menu</b>: PC / Mobile, jamoa, jang<br />
        Mobile: joystick + OT / B / R · ☰ = menu<br />
        PC: WASD · Space · ESC = menu
      </p>
    </div>
    <div id="app">
      <div id="game-root" tabindex="0"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      document.addEventListener('contextmenu', (e) => e.preventDefault());
      window.addEventListener('load', () => {
        const root = document.getElementById('game-root');
        root?.focus();
        root?.addEventListener('pointerdown', () => root.focus());
      });
    </script>
  </body>
</html>
